name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scirust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu
      - name: Format
        run: cargo fmt --check
      - name: Clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
      - name: NEON path cross-compile check (aarch64)
        run: cargo build --lib --target aarch64-unknown-linux-gnu
