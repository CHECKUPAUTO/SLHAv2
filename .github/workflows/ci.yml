name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (warnings = errors, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build all targets (lib + tests + benches + examples)
        run: cargo build --workspace --all-targets
      - name: Tests (unit + integration + property/fuzz + doctests)
        run: cargo test --workspace
      - name: Docs (warnings = errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - name: Self-audit (slha-audit end-to-end)
        run: cargo run --bin slha-audit -- --json
      - name: Benchmarks compile (scirust criterion)
        # Only `scirust` ships benches. `cargo bench --workspace` would also try
        # to link `slha-python`'s cdylib test target in the bench (release/LTO)
        # profile, which fails: pyo3 `extension-module` intentionally does not
        # link libpython (the interpreter provides it at load time), and LTO
        # then flags the unresolved `Py_*` symbols. `cargo build --workspace
        # --all-targets` and `cargo test --workspace` (dev profile, no LTO) stay
        # green; only the release/bench link is affected.
        run: cargo bench -p scirust --no-run
      - name: AArch64 cross-compile (NEON path + C-ABI crate)
        # Build scirust (NEON kernel path) AND slha-c (C-ABI, the crate that
        # broke on aarch64 because of `*mut i8` vs `*mut c_char`) + slha-mcp,
        # the workspace members with no external (non-cross-compiling) deps.
        # slha-python (PyO3) is excluded: it needs aarch64 Python dev libs.
        run: cargo build -p scirust -p slha-c -p slha-mcp --lib --target aarch64-unknown-linux-gnu
      - name: Publish dry-run (scirust is crates.io-ready)
        run: cargo publish -p scirust --dry-run

  msrv:
    name: MSRV (Rust 1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Check workspace on the declared MSRV
        run: cargo check --workspace --all-targets
